services:

  db:
    image: postgres:16-alpine
    container_name: invest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invest_web
    restart: unless-stopped
    command: sh /app/docker/entrypoint.sh
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - static_volume:/app/var/staticfiles
      - media_volume:/app/var/media
      - logs_volume:/app/var/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invest_scheduler
    restart: unless-stopped
    command: sh /app/docker/scheduler.sh
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - logs_volume:/app/var/logs
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: invest_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/var/staticfiles:ro
      - media_volume:/app/var/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - frontend

  certbot:
    image: certbot/certbot:latest
    container_name: invest_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume:
  certbot_certs:
  certbot_www:

networks:
  backend:
  frontend:
